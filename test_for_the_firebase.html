<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de connexion à Firestore</title>
</head>
<body>

    <h1>Test de connexion à Firestore</h1>
    <p>Ouvrez la console de votre navigateur (F12) pour voir les résultats.</p>
    
    <br>
    
    <button id="add-data">Ajouter une donnée de restaurant</button>
    <button id="read-data">Lire les données des restaurants</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-analytics.js"></script>

    <script>
        // Vos informations de configuration
        const firebaseConfig = {
          apiKey: "AIzaSyA_-HbKHMUbNiX6pvw5d9t73oqTvFjp7Co",
          authDomain: "restaurant-896d0.firebaseapp.com",
          projectId: "restaurant-896d0",
          storageBucket: "restaurant-896d0.firebasestorage.app",
          messagingSenderId: "1037108801190",
          appId: "1:1037108801190:web:9a2308dc0cb53b29854e67",
          measurementId: "G-ESNJW4VC0Y"
        };

        // Initialisation de Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = app.firestore(); // Initialisation de Firestore
        const analytics = app.analytics(); // Initialisation d'Analytics

        // Références aux boutons HTML
        const addButton = document.getElementById('add-data');
        const readButton = document.getElementById('read-data');

        // Fonction pour ajouter une donnée
        function addRestaurant() {
            db.collection("restaurants").add({
                nom: "Le Goût du Coin",
                ville: "Tunis",
                note: 4.8,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then((docRef) => {
                console.log("Document ajouté avec l'ID : ", docRef.id);
            })
            .catch((error) => {
                console.error("Erreur lors de l'ajout du document : ", error);
            });
        }

        // Fonction pour lire les données
        function readRestaurants() {
            db.collection("restaurant").get()
            .then((querySnapshot) => {
                console.log("Lecture des documents :");
                querySnapshot.forEach((doc) => {
                    console.log(`${doc.id} => `, doc.data());
                });
            })
            .catch((error) => {
                console.error("Erreur lors de la lecture des documents : ", error);
            });
        }
        
        // Attachement des fonctions aux événements des boutons
        addButton.addEventListener('click', addRestaurant);
        readButton.addEventListener('click', readRestaurants);
    </script>

</body>
</html>
